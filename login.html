<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In / Create Account — BŌRYKU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/account.css">
</head>
<body>

<!-- Back to home -->
<a href="index.html" style="position:fixed;top:20px;left:24px;z-index:100;display:flex;align-items:center;gap:8px;font-size:0.8125rem;font-weight:600;color:var(--text-3);transition:color 0.2s;" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back
</a>

<div class="auth-bg"></div>
<div class="auth-bg-grid"></div>

<div class="auth-page">
  <div class="auth-box">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;">
      <a href="index.html" style="display:inline-flex;flex-direction:column;align-items:center;gap:8px;text-decoration:none;">
        <div style="width:48px;height:48px;background:var(--accent);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#fff;letter-spacing:0.05em;">RY</div>
        <div style="font-size:1.25rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;">BŌRYKU</div>
      </a>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Error -->
    <div class="auth-error" id="auth-error"></div>

    <!-- ===== LOG IN PANEL ===== -->
    <div class="auth-panel active" id="panel-login">
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:8px;">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            Password
            <a href="#" style="color:var(--accent);font-size:0.75rem;font-weight:600;">Forgot password?</a>
          </label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px;" id="login-btn">
          <span id="login-btn-text">Log In</span>
        </button>
      </form>

      <div class="auth-divider">or continue with</div>

      <button class="social-login-btn" onclick="showToast('Google login coming soon — requires Supabase setup.','info')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="social-login-btn" onclick="showToast('Apple login coming soon — requires Supabase setup.','info')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.44c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.95zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continue with Apple
      </button>

      <p style="text-align:center;margin-top:20px;font-size:0.8125rem;color:var(--text-3);">
        Don't have an account?
        <a href="#" onclick="switchTab('signup')" style="color:var(--accent);font-weight:700;">Create one →</a>
      </p>
    </div>

    <!-- ===== SIGN UP PANEL ===== -->
    <div class="auth-panel" id="panel-signup">
      <form id="signup-form" onsubmit="handleSignUp(event)">
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="John Doe" autocomplete="name" required>
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="signup-confirm" placeholder="Repeat password" required>
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px;font-size:0.8125rem;color:var(--text-3);">
          <input type="checkbox" id="agree-terms" style="accent-color:var(--accent);margin-top:2px;cursor:pointer;" required>
          <label for="agree-terms">I agree to the <a href="#" style="color:var(--accent);">Terms of Service</a> and <a href="#" style="color:var(--accent);">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;" id="signup-btn">
          <span id="signup-btn-text">Create Account</span>
        </button>
      </form>

      <div class="auth-divider">or</div>
      <button class="social-login-btn" onclick="showToast('Google sign-up coming soon.','info')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </button>

      <p style="text-align:center;margin-top:20px;font-size:0.8125rem;color:var(--text-3);">
        Already have an account?
        <a href="#" onclick="switchTab('login')" style="color:var(--accent);font-weight:700;">Log in →</a>
      </p>
    </div>

  </div>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
  /* Redirect if already logged in */
  if (BORIKU_AUTH.isLoggedIn()) {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'account.html';
  }

  /* Check URL param for default tab */
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('mode') === 'signup') switchTab('signup');

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
    document.getElementById('auth-error').classList.remove('show');
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const btnText = document.getElementById('login-btn-text');
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    btnText.textContent = 'Logging in…';
    btn.disabled = true;

    await new Promise(r => setTimeout(r, 600)); /* simulate network */
    const { user, error } = await BORIKU_AUTH.signIn(email, password);

    if (error) {
      showError(error);
      btnText.textContent = 'Log In';
      btn.disabled = false;
      return;
    }

    btnText.textContent = '✓ Success!';
    await new Promise(r => setTimeout(r, 400));
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'account.html';
  }

  async function handleSignUp(e) {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const btnText = document.getElementById('signup-btn-text');
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;

    if (password !== confirm) { showError('Passwords do not match.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    btnText.textContent = 'Creating account…';
    btn.disabled = true;

    await new Promise(r => setTimeout(r, 700));
    const { user, error } = await BORIKU_AUTH.signUp(email, password, name);

    if (error) {
      showError(error);
      btnText.textContent = 'Create Account';
      btn.disabled = false;
      return;
    }

    btnText.textContent = '✓ Account created!';
    await new Promise(r => setTimeout(r, 400));
    window.location.href = 'account.html?welcome=true';
  }
</script>
</body>
</html>
